# Local Postgres with the pgvector extension, for running migrations and any
# integration tests against the corpus schema (packages/db).
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: imaia-db
    environment:
      POSTGRES_USER: imaia
      POSTGRES_PASSWORD: imaia
      POSTGRES_DB: imaia
    ports:
      # Host 5433 to avoid clashing with any local Postgres on 5432.
      - '5433:5432'
    volumes:
      - imaia_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U imaia -d imaia']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  imaia_db_data:
